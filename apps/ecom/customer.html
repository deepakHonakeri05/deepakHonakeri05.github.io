    <script>

        function shopkeeper() {
            // $("#shop_button").css('visibility', 'visible')
            //     .click( function () {
            //         window.location.replace("shopkeeper.html") ;
            //     })
            window.location.replace("index.html");
        }

        function customer() {
            $("#cust_button").css('visibility', 'visible')
                .click(function () {
                    window.location.replace("customer.html") ;
                })

            document.getElementsByTagName("BODY")[0].style.display = "block";

            $("#header").load("header.html");
            getOrders('pendingOrders');
            getOrders('pastOrders');
        }

        function delivery(){
            // $("#delivery_button").css('visibility', 'visible')
            //     .click(function () {
            //         window.location.replace("delivery.html") ;
            //     })
            window.location.replace("index.html");
        }

        function check(){
            auth.onAuthStateChanged(function (user){
                if(user) {
                    const id = user.uid;

                    localStorage.setItem("current_user", id);

                    var role = localStorage.getItem("role");
                    if (role == "Shopkeeper") {
                        db.collection("stores").doc(id).get().then(function (doc) {
                            if ((doc.data().role) == "Shopkeeper") {
                                shopkeeper();
                            }
                        });
                    }
                    if (role == "Delivery") {
                        db.collection("Delivery").doc(id).get().then(function (doc) {
                            if ((doc.data().role) == "Delivery") {
                                delivery();
                            }
                        });
                    }
                    if (role == "Customer") {
                        db.collection("Customer").doc(id).get().then(function (doc) {
                            if ((doc.data().role) == "Customer") {
                                customer();
                            }
                        });
                    }


                    $("#login").css('visibility', 'hidden');
                    $("#create").css('visibility', 'hidden') ;
                    $("#logout").css('visibility', 'visible').click(function () {
                        auth.signOut().then(function () {
                            // Sign-out successful.
                        }).catch(function (error) {
                            alert(error);
                        });
                    });
                }
                else{
                    //console.log("no user") ;
                    window.location.replace("index.html");
                }
            });
            //getOrders();  //getItems on page load
        }
    </script>


    <script>

        $(document).ready(function () {
            document.getElementsByTagName("BODY")[0].style.display = "none";
        });

        function getOrders(orderType) {

           var allItems =[] ;
           var userID = localStorage.getItem("current_user");
           var isDelivered = orderType == "pendingOrders" ? false : true;
           console.log(userID);
           db.collection("orders").where("user","==",userID).where("delivered","==",isDelivered).get()
               .then(function (querySnapshot) {
                   querySnapshot.forEach(function(doc) {
                       var order = {
                        names : doc.data().products,
                        prices : doc.data().prices,
                        address : doc.data().address,
                        assigned : doc.data().assigned,
                        deliver : doc.data().delivered 
                       } ;
                       allItems.push(order);
                   })
               }).then(function () {
                   console.log(allItems) ;

                   var template ;

                    if(allItems.length == 0){
                        template = '<center> <p> <i>No pending orders.</i> </p> </center>'
                    }

                    else{

                        template= '<table class="table"><thead><tr><th>Item Name</th><th>Prices</th><th>Address</th><th>Status</th></tr><tbody>';
                        for(var j=0;j<allItems.length;j++) {
                           template = template +
                               '<tr>' + '<td>'+allItems[j].names+'</td>' +
                               '<td>'+ allItems[j].prices+'</td>'+ '<td>'+allItems[j].address +'</td>' ;

                            for(var k=0;k<allItems[j].length;k++){
                                template = template + '<td>'+allItems[j].products[k]+'</td>' ;
                            }

                            if(isDelivered == false){
                                template = template + '<td><button class="btn btn-danger" '+ ' id='+ allItems[j].id +'>Yet to be dispatched</button></td></tr>';
                            }

                            else{
                                template = template + '<td><button class="btn btn-success">Delivered</button></td></tr>';
                            }

                        }
                        var end = template + '</tbody></table>' ;
                    } 
                    

               document.getElementById(orderType).innerHTML= template ;

            }).catch(function (error) {
                console.log(error) ;
            });

        }

    </script>
