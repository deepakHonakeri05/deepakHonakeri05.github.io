<!DOCTYPE html>
<html>
<head>
	<title>Register Here!</title>
</head>
<body>

<h1>Register Here!</h1>

  	<form>
		<label for="first_name">First Name : </label>
		<input id="first_name" type="text" name="First-Name" required>

		<label for="last_name">Last Name : </label>
		<input id="last_name" type="text" name="Last-Name" required>

		<br>

		<label for="male">Male : </label>
		<input id = "male" type="radio" name="male" value="MALE">

		<label for="female">Female : </label>
		<input id="female" type="radio" name="female" value="FEMALE">

		<label for="other">Other : </label>
		<input id="other" type="radio" name="other" value="OTHER">

		<br>

		<label for="email">Email : </label>
 		<input id="email" type="email" name="email" required>

 		<label for="password">Password : </label>
 		<input id="password" type="password" name="Password" required>

 		<br>

 		<label for="birthday">Birthday</label>
 		<select>
 			<option>Month</option>
 			<option>1</option>
 			<option>2</option>
 			<option>3</option>
 			<option>4</option>
 			<option>5</option>
 		</select>

 		<select>
 			<option>Day</option>
 			<option>1</option>
 			<option>2</option>
 			<option>3</option>
 			<option>4</option>
 			<option>5</option>
 			
 		</select>

 		<select>
 			<option>Year</option>
 			<option>1999</option>
 			<option>1998</option>
 			<option>1997</option>
 			<option>1996</option>
 			<option>1995</option>
 		</select>

 		<br>

 		<label for="T&C">Agree to T&C:</label>
 		<input id="T&C" type="radio" name="T&C" required>

 		<br>

 		<button>GO!</button>
    </form>
</body>
</html>
