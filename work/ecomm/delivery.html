    <script>

        function shopkeeper() {
            // $("#shop_button").css('visibility', 'visible')

            window.location.replace("index.html");

        function customer() {
            // $("#cust_button").css('visibility', 'visible')
            //     .click(function () {
            //         window.location.replace("customer.html") ;
            //     })
            window.location.replace("index.html");
        }

        function delivery(){
            $("#delivery_button").css('visibility', 'visible')
                .click(function () {
                    window.location.replace("delivery.html") ;
                })
            document.getElementsByTagName("BODY")[0].style.display = "block";
            getOrders('pendingOrders');
            getOrders('pastOrders');
        }

        function check(){
            auth.onAuthStateChanged(function (user){
                if(user) {
                    const id = user.uid;

                    localStorage.setItem("current_user", id);

                    var role = localStorage.getItem("role");
                    if (role == "Shopkeeper") {
                        db.collection("stores").doc(id).get().then(function (doc) {
                            if ((doc.data().role) == "Shopkeeper") {
                                shopkeeper();
                            }
                        });
                    }
                    if (role == "Delivery") {
                        db.collection("Delivery").doc(id).get().then(function (doc) {
                            if ((doc.data().role) == "Delivery") {
                                delivery();
                            }
                        });
                    }
                    if (role == "Customer") {
                        db.collection("Customer").doc(id).get().then(function (doc) {
                            if ((doc.data().role) == "Customer") {
                                customer();
                            }
                        });
                    }


                    $("#login").css('visibility', 'hidden');
                    $("#logout").css('visibility', 'visible').click(function () {
                        auth.signOut().then(function () {
                            // Sign-out successful.
                        }).catch(function (error) {
                            alert(error);
                        });
                    });
                }
                else{
                    // console.log("no user") ;
                    window.location.replace("Login.html") ;
                }
            });
        }
    </script>

            }
            alert("Delivery locations updated");
        }

        var changeId ;

        function delivered(e) {
            console.log(e) ;
            e = e || window.event;
            e = e.target || e.srcElement;
            if (e.nodeName === 'BUTTON') {
                changeId = e.id ; //a deafault javascript function to get button id
            }

            db.collection("orders").doc(changeId).update({
                delivered : true
            }).then(function () {
                alert("item delivered") ;
                document.getElementById(changeId).disabled = true;
            })

            getOrders('pendingOrders');
            getOrders('pastOrders');
        }


       function getOrders(orderType){
           var allItems =[] ;
           var a = localStorage.getItem("current_user");
           var isDelivered = orderType == "pendingOrders" ? false : true;
           console.log(a);
           db.collection("orders").where("dperson","==",a).where("delivered","==",isDelivered).get()
               .then(function (querySnapshot) {
                   querySnapshot.forEach(function(doc) {
                       var order = {
                            id : doc.id,
                            products: doc.data().products,
                            prices : doc.data().prices,
                            CustomerName : doc.data().CustomerName,
                            address : doc.data().address
                       } ;
                       allItems.push(order);
                   })
               }).then(function () {
                   console.log(allItems) ;

                   var template ;

                    if(allItems.length == 0){
                        template = '<center> <p> <i>No pending orders.</i> </p> </center>'
                    }

                    else{

                            template= '<table class="table"><thead><tr><th>Order id</th><th>Customer Name</th><th>Address</th><th>Item</th><th>Status</th></tr><tbody>';
                            for(var j=0;j<allItems.length;j++) {
                               template = template +
                                   '<tr>' + '<td>'+allItems[j].id+'</td>' +
                                   '<td>'+ allItems[j].CustomerName+'</td>'+ '<td>'+allItems[j].address +'</td>' ;

                                var itemList;   
                                for(var k=0;k<allItems[j].products.length;k++){
                                    itemList = itemList + allItems[j].products[k] + ', ';
                                }
                                template = template + '<td>'+itemList +'</td>' ;
                                itemList = '';

                                if(isDelivered != true){
                                    template = template + '<td><button class="btn btn-danger" onClick="delivered()"'+ ' id='+ allItems[j].id +'>Deliver</button></td></tr>';
                                }

                                else{
                                    template = template + '<td><button class="btn btn-success">Delivered</button></td></tr>';
                                }

                            }

                        var end = template + '</tbody></table>' ;
                    }

               document.getElementById(orderType).innerHTML= template ;
           }).catch(function (error) {
                console.log(error) ;
           });

        }

        $(document).ready(function () {
            document.getElementsByTagName("BODY")[0].style.display = "none";
        });

    </script>
